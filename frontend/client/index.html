<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIFAR-100 Classifier</title>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Global Styles */
    :root {
      --primary: #4F46E5;
      --bg: #F3F4F6;
      --card-bg: #FFFFFF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --danger: #EF4444;
      --success: #10B981;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* Main Container */
    .app-container {
      width: 100%;
      max-width: 450px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.5s ease;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid #E5E7EB;
      text-align: center;
      background: #fff;
    }

    .header h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    .header p {
      margin: 5px 0 0;
      color: var(--text-sub);
      font-size: 0.85rem;
    }

    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed #D1D5DB;
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      background: #F9FAFB;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--primary);
      background: #EEF2FF;
    }

    .drop-icon {
      width: 40px;
      color: #9CA3AF;
      margin-bottom: 10px;
    }

    /* Preview */
    .preview-box {
      width: 100%;
      height: 200px;
      background: #000;
      border-radius: var(--radius);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #4338CA;
    }

    .btn-primary:disabled {
      background: #9CA3AF;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #D1D5DB;
      color: var(--text-sub);
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #F3F4F6;
      color: var(--text-main);
    }

    /* Result Card */
    .result-card {
      background: #F9FAFB;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid #E5E7EB;
      animation: slideUp 0.4s ease;
    }

    .result-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-sub);
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .result-class {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 5px 0 15px 0;
      color: var(--text-main);
    }

    .progress-bg {
      height: 8px;
      background: #E5E7EB;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #EF4444, #F59E0B, #10B981);
      width: 0%;
      transition: width 1s ease;
    }

    /* Utilities */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    .error {
      color: var(--danger);
      background: #FEF2F2;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      border: 1px solid #FECACA;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Components ---

    const ImageUploader = ({ file, setFile, preview, setPreview }) => {
      const [dragging, setDragging] = useState(false);

      const handleDrop = (e) => {
        e.preventDefault();
        setDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          processFile(e.dataTransfer.files[0]);
        }
      };

      const handleChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          processFile(e.target.files[0]);
        }
      };

      const processFile = (selectedFile) => {
        if (!selectedFile.type.startsWith('image/')) {
          alert("Please upload an image file.");
          return;
        }
        setFile(selectedFile);
        setPreview(URL.createObjectURL(selectedFile));
      };

      return (
        <div>
          {!preview ? (
            <div
              className={`drop-zone ${dragging ? 'drag-over' : ''}`}
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={handleDrop}
              onClick={() => document.getElementById('fileInput').click()}
            >
              <svg className="drop-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p>Click or Drag Image Here</p>
              <input type="file" id="fileInput" hidden accept="image/*" onChange={handleChange} />
            </div>
          ) : (
            <div className="preview-box">
              <img src={preview} alt="Preview" />
            </div>
          )}
        </div>
      );
    };

    const PredictionResult = ({ result }) => {
      if (!result) return null;

      // Convert confidence (0.0 - 1.0) to percentage
      const percent = (result.confidence * 100).toFixed(1);

      return (
        <div className="result-card">
          <div className="result-title">Prediction Result</div>
          <div className="result-class">{result.class}</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.9rem', marginBottom: '5px' }}>
            <span>Confidence</span>
            <span>{percent}%</span>
          </div>
          <div className="progress-bg">
            <div className="progress-fill" style={{ width: `${percent}%` }}></div>
          </div>
        </div>
      );
    };

    // --- Main App ---

    const App = () => {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      // --- CONFIGURATION ---
      // Replace with your Render backend URL (e.g., https://your-backend.onrender.com/predict)
      const API_URL = "http://127.0.0.1:8000/predict"; 

      const classify = async () => {
        if (!file) return;

        setLoading(true);
        setError(null);
        setResult(null);

        const formData = new FormData();
        // The key "file" must match the backend argument: file: UploadFile = File(...)
        formData.append('file', file);

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            throw new Error(`Server Error: ${response.statusText}`);
          }

          const data = await response.json();

          if (data.error) {
            throw new Error(data.error);
          }

          setResult(data);

        } catch (err) {
          console.error(err);
          setError("Failed to classify. Ensure the Python backend is running and model exists.");
        } finally {
          setLoading(false);
        }
      };

      const reset = () => {
        setFile(null);
        setPreview(null);
        setResult(null);
        setError(null);
      };

      return (
        <div className="app-container">

          <div className="header">
            <h1>CIFAR-100 Classifier</h1>
            <p>Upload an image to identify objects</p>
          </div>

          <div className="content">
            <ImageUploader
              file={file}
              setFile={setFile}
              preview={preview}
              setPreview={setPreview}
            />

            {!result && (
              <button
                className="btn btn-primary"
                onClick={classify}
                disabled={!file || loading}
              >
                {loading ? <span className="spinner"></span> : 'Classify Image'}
              </button>
            )}

            {error && <div className="error">{error}</div>}

            <PredictionResult result={result} />

            {file && !loading && (
              <button className="btn btn-secondary" onClick={reset}>
                Try Another Image
              </button>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
